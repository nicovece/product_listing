openapi: 3.0.0
info:
  title: Product Listing API
  description: API for product catalog with filtering, sorting, and pagination
  version: 1.0.0
  
servers:
  - url: http://localhost:3001/api
    description: Local development server

paths:
  /products:
    get:
      summary: Get paginated product listings with filtering and sorting
      description: |
        Retrieves products with optional filtering by price range and search text,
        sorting by various criteria, and pagination support.
      parameters:
        - name: page
          in: query
          description: Page number (1-based)
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Items per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: priceMin
          in: query
          description: Minimum price filter
          required: false
          schema:
            type: number
            minimum: 0
            maximum: 9999.99
        - name: priceMax
          in: query
          description: Maximum price filter
          required: false
          schema:
            type: number
            minimum: 0.01
            maximum: 9999.99
        - name: search
          in: query
          description: Product name search text
          required: false
          schema:
            type: string
            maxLength: 100
        - name: sortBy
          in: query
          description: Sort field
          required: false
          schema:
            type: string
            enum: [name, price, likes]
            default: name
        - name: sortOrder
          in: query
          description: Sort direction
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        '200':
          description: Successful response with products and pagination info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Product:
      type: object
      required:
        - id
        - name
        - price
        - likes
        - imageUrl
      properties:
        id:
          type: integer
          description: Unique product identifier
          example: 1
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Product display name
          example: "Wireless Bluetooth Headphones"
        price:
          type: number
          minimum: 0.01
          maximum: 9999.99
          description: Product price in USD
          example: 89.99
        likes:
          type: integer
          minimum: 0
          maximum: 999999
          description: Number of user likes
          example: 245
        imageUrl:
          type: string
          format: uri
          description: Product image URL from CDN
          example: "https://picsum.photos/300/300?random=1"
    
    PaginationInfo:
      type: object
      required:
        - currentPage
        - itemsPerPage
        - totalItems
        - totalPages
      properties:
        currentPage:
          type: integer
          minimum: 1
          description: Current page number (1-based)
          example: 1
        itemsPerPage:
          type: integer
          minimum: 1
          description: Number of items per page
          example: 25
        totalItems:
          type: integer
          minimum: 0
          description: Total number of items matching filters
          example: 150
        totalPages:
          type: integer
          minimum: 0
          description: Total number of pages
          example: 6
    
    AppliedFilters:
      type: object
      properties:
        priceMin:
          type: number
          minimum: 0
          description: Applied minimum price filter
          example: 20.00
        priceMax:
          type: number
          minimum: 0.01
          description: Applied maximum price filter
          example: 100.00
        searchText:
          type: string
          description: Applied search text filter
          example: "headphones"
        sortBy:
          type: string
          enum: [name, price, likes]
          description: Applied sort field
          example: "price"
        sortOrder:
          type: string
          enum: [asc, desc]
          description: Applied sort direction
          example: "asc"
    
    ProductListResponse:
      type: object
      required:
        - products
        - pagination
        - appliedFilters
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
          description: Array of products for current page
        pagination:
          $ref: '#/components/schemas/PaginationInfo'
        appliedFilters:
          $ref: '#/components/schemas/AppliedFilters'
    
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error type identifier
          example: "VALIDATION_ERROR"
        message:
          type: string
          description: Human-readable error message
          example: "Invalid price range: priceMin cannot be greater than priceMax"
        details:
          type: object
          description: Additional error details
          example:
            field: "priceMin"
            value: "150.00"
            constraint: "must be <= priceMax (100.00)"