openapi: 3.0.3
info:
  title: Product Content Management API
  version: 1.0.0
  description: Admin API for managing product catalog, categories, and inventory

servers:
  - url: http://localhost:3001/api/admin
    description: Development server

paths:
  /products:
    get:
      summary: List all products for management
      tags: [Products]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 25
        - name: category
          in: query
          schema:
            type: integer
          description: Filter by category ID
        - name: status
          in: query
          schema:
            type: string
            enum: [in_stock, out_of_stock, low_stock]
        - name: search
          in: query
          schema:
            type: string
          description: Search by name, SKU, or brand
      responses:
        '200':
          description: Products list with pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      summary: Create new product
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/{id}:
    get:
      summary: Get single product for editing
      tags: [Products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update existing product
      tags: [Products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Validation error
        '404':
          description: Product not found

    delete:
      summary: Delete product (soft delete)
      tags: [Products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Product deleted successfully
        '404':
          description: Product not found

  /products/bulk:
    patch:
      summary: Bulk update products
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkUpdateRequest'
      responses:
        '200':
          description: Bulk operation completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated_count:
                    type: integer
                  failed_items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        error:
                          type: string

    delete:
      summary: Bulk delete products
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_ids:
                  type: array
                  items:
                    type: integer
                  minItems: 1
      responses:
        '200':
          description: Bulk delete completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted_count:
                    type: integer
                  failed_items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        error:
                          type: string

  /categories:
    get:
      summary: List all categories
      tags: [Categories]
      parameters:
        - name: include_products
          in: query
          schema:
            type: boolean
            default: false
          description: Include product count for each category
      responses:
        '200':
          description: Categories list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'

    post:
      summary: Create new category
      tags: [Categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          description: Validation error

  /categories/{id}:
    get:
      summary: Get single category
      tags: [Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Category details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404':
          description: Category not found

    put:
      summary: Update existing category
      tags: [Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: Category updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          description: Validation error
        '404':
          description: Category not found

    delete:
      summary: Delete category
      tags: [Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Category deleted successfully
        '400':
          description: Cannot delete category with products
        '404':
          description: Category not found

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        sku:
          type: string
          nullable: true
        brand:
          type: string
          nullable: true
        price:
          type: integer
          description: Price in cents
        category_id:
          type: integer
          nullable: true
        category:
          $ref: '#/components/schemas/Category'
          nullable: true
        inventory_status:
          type: string
          enum: [in_stock, out_of_stock, low_stock]
        inventory_count:
          type: integer
        weight_grams:
          type: integer
          nullable: true
        dimensions_cm:
          type: object
          nullable: true
          properties:
            length:
              type: number
            width:
              type: number
            height:
              type: number
        primary_image_url:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProductRequest:
      type: object
      required:
        - name
        - price
        - inventory_status
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 2000
        sku:
          type: string
          maxLength: 50
          pattern: '^[A-Za-z0-9-]+$'
        brand:
          type: string
          maxLength: 100
        price:
          type: integer
          minimum: 0
          description: Price in cents
        category_id:
          type: integer
          nullable: true
        inventory_status:
          type: string
          enum: [in_stock, out_of_stock, low_stock]
        inventory_count:
          type: integer
          minimum: 0
          default: 0
        weight_grams:
          type: integer
          minimum: 1
        dimensions_cm:
          type: object
          properties:
            length:
              type: number
              minimum: 0
            width:
              type: number
              minimum: 0
            height:
              type: number
              minimum: 0
        primary_image_url:
          type: string
          format: uri
        tags:
          type: array
          items:
            type: string
            maxLength: 50

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 2000
        sku:
          type: string
          maxLength: 50
          pattern: '^[A-Za-z0-9-]+$'
        brand:
          type: string
          maxLength: 100
        price:
          type: integer
          minimum: 0
        category_id:
          type: integer
          nullable: true
        inventory_status:
          type: string
          enum: [in_stock, out_of_stock, low_stock]
        inventory_count:
          type: integer
          minimum: 0
        weight_grams:
          type: integer
          minimum: 1
        dimensions_cm:
          type: object
          properties:
            length:
              type: number
              minimum: 0
            width:
              type: number
              minimum: 0
            height:
              type: number
              minimum: 0
        primary_image_url:
          type: string
          format: uri
        tags:
          type: array
          items:
            type: string
            maxLength: 50
        is_active:
          type: boolean

    BulkUpdateRequest:
      type: object
      required:
        - product_ids
        - updates
      properties:
        product_ids:
          type: array
          items:
            type: integer
          minItems: 1
        updates:
          type: object
          properties:
            category_id:
              type: integer
              nullable: true
            inventory_status:
              type: string
              enum: [in_stock, out_of_stock, low_stock]
            price:
              type: integer
              minimum: 0
            is_active:
              type: boolean

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        parent_category_id:
          type: integer
          nullable: true
        sort_order:
          type: integer
        is_active:
          type: boolean
        product_count:
          type: integer
          description: Number of products in this category (when requested)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
        parent_category_id:
          type: integer
          nullable: true
        sort_order:
          type: integer
          minimum: 0
          default: 0

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
        parent_category_id:
          type: integer
          nullable: true
        sort_order:
          type: integer
          minimum: 0
        is_active:
          type: boolean

    Pagination:
      type: object
      properties:
        current_page:
          type: integer
        per_page:
          type: integer
        total_items:
          type: integer
        total_pages:
          type: integer
        has_next:
          type: boolean
        has_prev:
          type: boolean

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
          nullable: true