app = 'product-listing'
primary_region = 'mad'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3001'
  DATABASE_PATH = '/data/products.db'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'data'
  destination = '/data'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
